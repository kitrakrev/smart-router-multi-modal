# H200 — medical specialist models (via SSH tunnel to localhost:8001)
# A100 — general model (localhost:8002)

models:
  - name: medgemma-4b
    type: medical-vision
    provider: h200
    model_id: google/medgemma-1.5-4b-it
    api_base: "http://localhost:8001"
    capabilities: [vision, medical, text]
    specialties: [dermatology]
    cost_per_1k_input: 0.05
    cost_per_1k_output: 0.15
    avg_latency_ms: 300
    quality_score: 0.85

  - name: llava-med-7b
    type: medical-vision
    provider: h200
    model_id: microsoft/llava-med-v1.5-mistral-7b
    api_base: "http://localhost:8001"
    capabilities: [vision, medical, text]
    specialties: [pathology, radiology]
    cost_per_1k_input: 0.07
    cost_per_1k_output: 0.21
    avg_latency_ms: 450
    quality_score: 0.90

  - name: llava-1.6-7b
    type: general-vision
    provider: a100
    model_id: llava-hf/llava-v1.6-mistral-7b-hf
    api_base: "http://localhost:8002"
    capabilities: [vision, text, code, reasoning]
    specialties: [code, reasoning, creative, simple_qa]
    cost_per_1k_input: 0.07
    cost_per_1k_output: 0.21
    avg_latency_ms: 400
    quality_score: 0.76
