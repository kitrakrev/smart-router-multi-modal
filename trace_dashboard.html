<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Router Trace &amp; Models Dashboard</title>
<style>
/* ------------------------------------------------------------------ */
/* Reset & base                                                       */
/* ------------------------------------------------------------------ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;--border:#30363d;
  --text:#c9d1d9;--text2:#8b949e;--accent:#58a6ff;--green:#3fb950;
  --yellow:#d29922;--red:#f85149;--orange:#db6d28;--blue:#58a6ff;
  --purple:#bc8cff;--gray:#484f58;
  --node-w:140px;--node-h:68px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;overflow:hidden;height:100vh}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}

/* ------------------------------------------------------------------ */
/* Layout: sidebar + main                                             */
/* ------------------------------------------------------------------ */
.app{display:flex;height:100vh}
.sidebar{width:340px;min-width:300px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border)}
.sidebar-header h2{font-size:14px;font-weight:600;color:var(--accent);letter-spacing:.5px;text-transform:uppercase}
.sidebar-body{flex:1;overflow-y:auto;padding:8px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ------------------------------------------------------------------ */
/* Top bar                                                            */
/* ------------------------------------------------------------------ */
.topbar{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg2)}
.topbar h1{font-size:16px;font-weight:600;white-space:nowrap}
.topbar .status{margin-left:auto;font-size:12px;color:var(--text2)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}
.dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}
.dot.off{background:var(--red)}
.filter-bar{display:flex;gap:8px;align-items:center}
.filter-bar select,.filter-bar input{font-size:12px;padding:4px 8px}

/* ------------------------------------------------------------------ */
/* Trace graph area                                                   */
/* ------------------------------------------------------------------ */
.graph-area{flex:1;overflow:auto;position:relative}
.trace-container{padding:24px 20px;display:flex;flex-direction:column;gap:32px}
.trace-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;position:relative}
.trace-meta{display:flex;gap:16px;align-items:center;margin-bottom:14px;font-size:12px;color:var(--text2)}
.trace-meta .trace-id{font-family:monospace;color:var(--accent)}
.trace-meta .query-preview{max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}

/* SVG pipeline */
.pipeline-svg{width:100%;overflow-x:auto}

/* ------------------------------------------------------------------ */
/* Pipeline nodes (HTML overlay)                                      */
/* ------------------------------------------------------------------ */
.pipeline-row{display:flex;align-items:flex-start;gap:0;overflow-x:auto;padding:8px 0}
.node-wrapper{display:flex;align-items:center;flex-shrink:0}
.edge-line{width:36px;height:2px;position:relative;flex-shrink:0}
.edge-line::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--border)}
.edge-line::after{content:'';position:absolute;right:0;top:-3px;border:4px solid transparent;border-left:6px solid var(--border)}
.edge-line.green::before{background:var(--green)}.edge-line.green::after{border-left-color:var(--green)}
.edge-line.yellow::before{background:var(--yellow)}.edge-line.yellow::after{border-left-color:var(--yellow)}
.edge-line.red::before{background:var(--red)}.edge-line.red::after{border-left-color:var(--red)}
.edge-label{position:absolute;top:6px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--text2);white-space:nowrap}

.pnode{
  width:var(--node-w);min-height:var(--node-h);
  border:1.5px solid var(--border);border-radius:8px;
  background:var(--bg3);padding:8px 10px;cursor:pointer;
  transition:border-color .2s,box-shadow .2s;position:relative;
}
.pnode:hover{border-color:var(--accent);box-shadow:0 0 12px rgba(88,166,255,.15)}
.pnode.green{border-color:var(--green)}.pnode.green .pnode-icon{color:var(--green)}
.pnode.yellow{border-color:var(--yellow)}.pnode.yellow .pnode-icon{color:var(--yellow)}
.pnode.red{border-color:var(--red);background:#1a0a0a}.pnode.red .pnode-icon{color:var(--red)}
.pnode.gray{border-color:var(--gray);opacity:.5}.pnode.gray .pnode-icon{color:var(--gray)}
.pnode.blue{border-color:var(--blue);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 4px rgba(88,166,255,.2)}50%{box-shadow:0 0 16px rgba(88,166,255,.5)}}

.pnode-header{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.pnode-icon{font-size:14px}
.pnode-label{font-size:11px;font-weight:600;color:var(--text)}
.pnode-detail{font-size:10px;color:var(--text2);line-height:1.4}
.pnode-detail span{display:block}

/* Expanded detail overlay */
.node-expand{
  position:absolute;top:calc(100% + 6px);left:0;z-index:20;
  width:260px;background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;padding:12px;font-size:11px;
  box-shadow:0 8px 24px rgba(0,0,0,.4);display:none;
}
.node-expand.open{display:block}
.node-expand h4{color:var(--accent);font-size:12px;margin-bottom:8px}
.node-expand table{width:100%;border-collapse:collapse}
.node-expand td{padding:2px 4px;vertical-align:top}
.node-expand td:first-child{color:var(--text2);white-space:nowrap;width:90px}
.node-expand td:last-child{color:var(--text);word-break:break-all}

/* ------------------------------------------------------------------ */
/* Model cards in sidebar                                             */
/* ------------------------------------------------------------------ */
.model-card{
  background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;margin-bottom:6px;cursor:default;
  transition:border-color .2s;
}
.model-card:hover{border-color:var(--accent)}
.model-card .mc-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.model-card .mc-name{font-size:13px;font-weight:600;color:var(--text)}
.model-card .mc-health{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.model-card .mc-health.ok{background:var(--green)}.model-card .mc-health.fail{background:var(--red)}.model-card .mc-health.unknown{background:var(--gray)}
.mc-caps{display:flex;flex-wrap:wrap;gap:4px;margin:4px 0}
.mc-cap{font-size:10px;padding:1px 6px;border-radius:3px;background:var(--bg);border:1px solid var(--border);color:var(--text2)}
.mc-stats{font-size:11px;color:var(--text2);display:flex;gap:10px}
.mc-actions{display:flex;gap:6px;margin-top:6px}
.mc-actions button{font-size:11px;padding:3px 10px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--text2)}
.mc-actions button:hover{border-color:var(--accent);color:var(--accent)}
.mc-actions button.danger:hover{border-color:var(--red);color:var(--red)}
.mc-disabled{opacity:.5}

/* Add model / discover buttons */
.sidebar-actions{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px}
.sidebar-actions button{flex:1;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:12px;font-weight:500}
.sidebar-actions button:hover{border-color:var(--accent);color:var(--accent)}
.sidebar-actions button.primary{background:var(--accent);color:#0d1117;border-color:var(--accent)}
.sidebar-actions button.primary:hover{opacity:.9}

/* ------------------------------------------------------------------ */
/* Modal                                                              */
/* ------------------------------------------------------------------ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;
  display:none;align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:24px;width:440px;max-height:80vh;overflow-y:auto;
}
.modal h3{font-size:16px;margin-bottom:16px;color:var(--accent)}
.modal label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;margin-top:10px}
.modal input,.modal select{width:100%}
.modal .caps-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.modal .caps-grid label{display:flex;align-items:center;gap:4px;margin:0;cursor:pointer;font-size:12px;color:var(--text)}
.modal .caps-grid input[type=checkbox]{width:auto}
.modal-buttons{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
.modal-buttons button{padding:8px 18px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px}
.modal-buttons button.primary{background:var(--accent);color:#0d1117;border-color:var(--accent)}
.modal-buttons button:hover{opacity:.85}

/* ------------------------------------------------------------------ */
/* Empty state                                                        */
/* ------------------------------------------------------------------ */
.empty-state{text-align:center;padding:80px 20px;color:var(--text2)}
.empty-state h3{font-size:18px;margin-bottom:8px;color:var(--text)}
.empty-state p{font-size:13px;max-width:400px;margin:0 auto}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gray)}
</style>
</head>
<body>
<div class="app">

  <!-- ======================== SIDEBAR ======================== -->
  <div class="sidebar">
    <div class="sidebar-header"><h2>Models</h2></div>
    <div class="sidebar-body" id="modelList">
      <div class="empty-state" id="noModels" style="padding:40px 10px">
        <p>No models registered yet.</p>
      </div>
    </div>
    <div class="sidebar-actions">
      <button class="primary" onclick="openAddModal()">+ Add Model</button>
      <button onclick="openDiscoverModal()">Auto-Discover</button>
    </div>
  </div>

  <!-- ======================== MAIN ======================== -->
  <div class="main">
    <div class="topbar">
      <h1>Trace Pipeline</h1>
      <div class="filter-bar">
        <select id="filterModel" onchange="applyFilters()"><option value="">All Models</option></select>
        <select id="filterStatus" onchange="applyFilters()">
          <option value="">All Statuses</option>
          <option value="ok">Passed</option>
          <option value="blocked">Blocked</option>
        </select>
        <input type="text" id="filterQuery" placeholder="Search query..." oninput="applyFilters()" style="width:160px">
      </div>
      <div class="status"><span class="dot off" id="wsDot"></span><span id="wsLabel">Disconnected</span></div>
    </div>
    <div class="graph-area">
      <div class="trace-container" id="traceContainer">
        <div class="empty-state" id="noTraces">
          <h3>No traces yet</h3>
          <p>Send a request through the router to see the pipeline visualization here in real time.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ======================== ADD MODEL MODAL ======================== -->
<div class="modal-overlay" id="addModelModal">
  <div class="modal">
    <h3 id="modalTitle">Add Model</h3>
    <label>Name</label>
    <input id="mName" placeholder="my-local-llama">
    <label>Provider</label>
    <select id="mProvider">
      <option value="openai">OpenAI</option>
      <option value="anthropic">Anthropic</option>
      <option value="local">Local</option>
      <option value="custom" selected>Custom</option>
    </select>
    <label>API Base URL</label>
    <input id="mApiBase" placeholder="http://localhost:11434/v1">
    <label>API Key (optional)</label>
    <input id="mApiKey" type="password" placeholder="sk-...">
    <label>Model ID</label>
    <input id="mModelId" placeholder="llama3.1:8b">
    <label>Capabilities</label>
    <div class="caps-grid">
      <label><input type="checkbox" value="text" checked> Text</label>
      <label><input type="checkbox" value="vision"> Vision</label>
      <label><input type="checkbox" value="tools"> Tools</label>
      <label><input type="checkbox" value="reasoning"> Reasoning</label>
      <label><input type="checkbox" value="code"> Code</label>
    </div>
    <label>Cost per 1K input tokens ($)</label>
    <input id="mCostIn" type="number" step="0.001" value="0">
    <label>Cost per 1K output tokens ($)</label>
    <input id="mCostOut" type="number" step="0.001" value="0">
    <label>Avg Latency (ms)</label>
    <input id="mLatency" type="number" value="500">
    <label>Max Context</label>
    <input id="mMaxCtx" type="number" value="128000">
    <div class="modal-buttons">
      <button onclick="closeAddModal()">Cancel</button>
      <button class="primary" onclick="submitModel()">Add</button>
    </div>
  </div>
</div>

<!-- ======================== DISCOVER MODAL ======================== -->
<div class="modal-overlay" id="discoverModal">
  <div class="modal">
    <h3>Auto-Discover Models</h3>
    <label>API Base URL</label>
    <input id="dApiBase" placeholder="http://localhost:11434/v1">
    <label>API Key (optional)</label>
    <input id="dApiKey" type="password" placeholder="sk-...">
    <label>Provider Label</label>
    <select id="dProvider">
      <option value="openai">OpenAI</option>
      <option value="anthropic">Anthropic</option>
      <option value="local">Local</option>
      <option value="custom" selected>Custom</option>
    </select>
    <div class="modal-buttons">
      <button onclick="closeDiscoverModal()">Cancel</button>
      <button class="primary" onclick="submitDiscover()">Discover</button>
    </div>
  </div>
</div>

<script>
/* ================================================================== */
/*  CONFIG                                                            */
/* ================================================================== */
const API_BASE = window.location.origin;
const WS_URL = `ws://${window.location.host}/ws/traces`;

/* ================================================================== */
/*  STATE                                                             */
/* ================================================================== */
let models = [];       // ModelEntry dicts
let traces = [];       // trace objects from API / WS
let ws = null;
let expandedNode = null;

/* ================================================================== */
/*  PIPELINE NODE DEFINITIONS                                         */
/* ================================================================== */
const PIPELINE_NODES = [
  {id:"input",       label:"Input",        icon:"\u2B9E",  type:"parser"},
  {id:"guardrails",  label:"Guardrails",   icon:"\uD83D\uDEE1",type:"safety",     children:["jailbreak","pii","injection"]},
  {id:"signals",     label:"Signals",      icon:"\uD83D\uDCE1",type:"extraction", children:["keyword","domain","complexity","language","vision","tool","modality"]},
  {id:"embedding",   label:"Embedding",    icon:"\uD83E\uDDE0",type:"ml"},
  {id:"cache",       label:"Cache Check",  icon:"\uD83D\uDDC3",type:"cache"},
  {id:"decision",    label:"Decision",     icon:"\u2696",  type:"router"},
  {id:"model_select",label:"Model Select", icon:"\uD83C\uDFAF",type:"selection"},
  {id:"model_call",  label:"Model API",    icon:"\uD83D\uDD17",type:"external"},
  {id:"response",    label:"Response",     icon:"\u2705",  type:"output"},
];

/* ================================================================== */
/*  UTILITY                                                           */
/* ================================================================== */
function $(sel){return document.querySelector(sel)}
function $$(sel){return document.querySelectorAll(sel)}
function fmt(v){return v===undefined||v===null?'-':typeof v==='number'?v.toFixed(3):String(v)}
function fmtMs(v){return v===undefined?'-':`${Math.round(v)}ms`}
function edgeColor(ms){if(ms===undefined)return '';if(ms<10)return 'green';if(ms<100)return 'yellow';return 'red'}

/* ================================================================== */
/*  TRACE RENDERING                                                   */
/* ================================================================== */
function signalByName(signals, name){
  return signals.find(s=>s.name===name) || null;
}

function buildNodeData(trace){
  /* Derive per-node state from trace data */
  const d = trace.decision || {};
  const sigs = trace.signals || [];
  const safety = signalByName(sigs,'safety');
  const pii = signalByName(sigs,'pii');
  const vision = signalByName(sigs,'vision');
  const tool = signalByName(sigs,'tool');
  const domain = signalByName(sigs,'domain');
  const complexity = signalByName(sigs,'complexity');
  const language = signalByName(sigs,'language');
  const keyword = signalByName(sigs,'keyword');
  const modality = signalByName(sigs,'modality');
  const blocked = d.blocked;

  const nodes = {};

  /* Input */
  const wordCount = trace.query ? trace.query.split(/\s+/).length : 0;
  nodes.input = {
    color:'green', lines:[`${wordCount} words`],
    detail:{query: trace.query},
    latency: 0,
  };

  /* Guardrails */
  const safetyScore = safety ? safety.score : 0;
  const piiFlagged = pii ? pii.metadata.total_matches > 0 : false;
  const guardrailColor = blocked ? 'red' : safetyScore > 0.3 ? 'yellow' : 'green';
  nodes.guardrails = {
    color: guardrailColor,
    lines:[
      `jailbreak: ${safety ? fmt(safety.score) : '-'}`,
      `pii: ${pii ? (pii.metadata.total_matches > 0 ? pii.metadata.total_matches+' found' : 'clean') : '-'}`,
    ],
    detail:{
      safety_score: safety ? safety.score : '-',
      safety_flagged: safety ? safety.metadata.flagged : '-',
      pii_types: pii ? JSON.stringify(pii.metadata.detected_types) : '-',
      pii_total: pii ? pii.metadata.total_matches : '-',
    },
    latency: (safety ? safety.execution_time_ms : 0) + (pii ? pii.execution_time_ms : 0),
  };

  /* Signals */
  const sigTotalMs = sigs.reduce((a,s)=>a + (s.execution_time_ms||0), 0);
  nodes.signals = {
    color: 'green',
    lines:[
      domain ? `domain: ${domain.metadata.domain || '-'} ${fmt(domain.score)}` : 'domain: -',
      complexity ? `complexity: ${fmt(complexity.score)}` : 'complexity: -',
      tool ? `tool: ${fmt(tool.score)}` : 'tool: -',
    ],
    detail: Object.fromEntries(sigs.map(s=>[s.name, `score=${fmt(s.score)} conf=${fmt(s.confidence)} ${fmtMs(s.execution_time_ms)}`])),
    latency: sigTotalMs,
  };

  /* Embedding */
  const domainTime = domain ? domain.execution_time_ms : 0;
  const embFallback = domain && domain.metadata.fallback;
  nodes.embedding = {
    color: embFallback ? 'gray' : 'green',
    lines:[embFallback ? 'skipped (fallback)' : fmtMs(domainTime)],
    detail:{embedding_time: fmtMs(domainTime), fallback: embFallback ? 'yes' : 'no'},
    latency: domainTime,
  };

  /* Cache -- simulated, always miss for now */
  nodes.cache = {
    color: 'gray',
    lines:['miss'],
    detail:{hit: 'no'},
    latency: 0,
  };

  /* Decision */
  nodes.decision = {
    color: blocked ? 'red' : 'green',
    lines:[
      blocked ? 'BLOCKED' : `rule: "${(d.reason||'').substring(0,30)}"`,
    ],
    detail:{reason: d.reason, blocked: blocked, config: JSON.stringify(d.inference_config)},
    latency: 0,
  };

  /* Model Select */
  nodes.model_select = {
    color: blocked ? 'red' : 'green',
    lines:[blocked ? '-' : d.selected_model || '-'],
    detail:{model: d.selected_model, estimated_cost: d.estimated_cost, estimated_latency: d.estimated_latency_ms},
    latency: 0,
  };

  /* Model API Call */
  const callLatency = trace.model_response_latency_ms || 0;
  nodes.model_call = {
    color: blocked ? 'gray' : callLatency > 1000 ? 'yellow' : 'green',
    lines:[blocked ? 'skipped' : fmtMs(callLatency)],
    detail:{latency: fmtMs(callLatency), model: d.selected_model},
    latency: callLatency,
  };

  /* Response */
  nodes.response = {
    color: blocked ? 'red' : 'green',
    lines:[blocked ? 'blocked' : `total: ${fmtMs(trace.total_latency_ms)}`],
    detail:{total_latency: fmtMs(trace.total_latency_ms), cost: d.estimated_cost},
    latency: trace.total_latency_ms,
  };

  return nodes;
}

function renderTrace(trace, index){
  const nodeData = buildNodeData(trace);
  const d = trace.decision || {};
  const blocked = d.blocked;

  let html = `<div class="trace-card" data-trace="${trace.trace_id}" data-model="${d.selected_model||''}" data-status="${blocked?'blocked':'ok'}">`;
  html += `<div class="trace-meta">`;
  html += `<span class="trace-id">#${trace.request_number||index+1}</span>`;
  html += `<span class="trace-id">${(trace.trace_id||'').substring(0,8)}</span>`;
  html += `<span class="query-preview">${escHtml(trace.query||'')}</span>`;
  html += `<span>${trace.timestamp ? new Date(trace.timestamp).toLocaleTimeString() : ''}</span>`;
  html += `<span>${fmtMs(trace.total_latency_ms)}</span>`;
  if(blocked) html += `<span style="color:var(--red)">BLOCKED</span>`;
  else html += `<span style="color:var(--green)">${d.selected_model||'-'}</span>`;
  html += `</div>`;

  /* Pipeline row */
  html += `<div class="pipeline-row">`;
  for(let i=0;i<PIPELINE_NODES.length;i++){
    const nd = PIPELINE_NODES[i];
    const data = nodeData[nd.id] || {color:'gray',lines:['-'],detail:{},latency:0};
    if(i>0){
      const lat = data.latency;
      const ec = edgeColor(lat);
      html += `<div class="edge-line ${ec}"><span class="edge-label">${lat>0?fmtMs(lat):''}</span></div>`;
    }
    html += `<div class="pnode ${data.color}" data-nodeid="${nd.id}" data-trace="${trace.trace_id}" onclick="toggleExpand(this)">`;
    html += `<div class="pnode-header"><span class="pnode-icon">${nd.icon}</span><span class="pnode-label">${nd.label}</span></div>`;
    html += `<div class="pnode-detail">${data.lines.map(l=>`<span>${escHtml(l)}</span>`).join('')}</div>`;
    /* expand overlay */
    html += `<div class="node-expand" id="exp-${trace.trace_id}-${nd.id}">`;
    html += `<h4>${nd.label} Details</h4><table>`;
    for(const[k,v] of Object.entries(data.detail||{})){
      html += `<tr><td>${k}</td><td>${escHtml(String(v))}</td></tr>`;
    }
    html += `</table></div>`;
    html += `</div>`; // close pnode
  }
  html += `</div>`; // close pipeline-row
  html += `</div>`; // close trace-card
  return html;
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function renderAllTraces(){
  const c = $('#traceContainer');
  const filtered = getFilteredTraces();
  if(filtered.length===0){
    c.innerHTML = `<div class="empty-state" id="noTraces"><h3>No traces yet</h3><p>Send a request through the router to see the pipeline visualization here in real time.</p></div>`;
    return;
  }
  c.innerHTML = filtered.map((t,i)=>renderTrace(t,i)).join('');
}

function toggleExpand(el){
  const tid = el.dataset.trace;
  const nid = el.dataset.nodeid;
  const expId = `exp-${tid}-${nid}`;
  const exp = document.getElementById(expId);
  if(!exp) return;
  // close all others
  $$('.node-expand.open').forEach(e=>{if(e.id!==expId)e.classList.remove('open')});
  exp.classList.toggle('open');
}

/* ================================================================== */
/*  FILTERS                                                           */
/* ================================================================== */
function getFilteredTraces(){
  const modelFilter = $('#filterModel').value;
  const statusFilter = $('#filterStatus').value;
  const queryFilter = ($('#filterQuery').value||'').toLowerCase();
  return traces.filter(t=>{
    const d = t.decision||{};
    if(modelFilter && d.selected_model !== modelFilter) return false;
    if(statusFilter==='blocked' && !d.blocked) return false;
    if(statusFilter==='ok' && d.blocked) return false;
    if(queryFilter && !(t.query||'').toLowerCase().includes(queryFilter)) return false;
    return true;
  });
}

function applyFilters(){renderAllTraces()}

function updateModelFilter(){
  const sel = $('#filterModel');
  const current = sel.value;
  sel.innerHTML = '<option value="">All Models</option>';
  const names = new Set(models.map(m=>m.name));
  traces.forEach(t=>{if(t.decision)names.add(t.decision.selected_model)});
  names.forEach(n=>{if(n&&n!=='BLOCKED'){
    const opt=document.createElement('option');opt.value=n;opt.textContent=n;sel.appendChild(opt);
  }});
  sel.value = current;
}

/* ================================================================== */
/*  MODEL SIDEBAR                                                     */
/* ================================================================== */
function renderModels(){
  const list = $('#modelList');
  if(models.length === 0){
    list.innerHTML = `<div class="empty-state" style="padding:40px 10px"><p>No models registered yet.</p></div>`;
    return;
  }
  list.innerHTML = models.map(m=>{
    const health = m._health;
    const hClass = health===true?'ok':health===false?'fail':'unknown';
    const disClass = m.enabled?'':'mc-disabled';
    return `<div class="model-card ${disClass}">
      <div class="mc-row">
        <span class="mc-health ${hClass}"></span>
        <span class="mc-name">${escHtml(m.name)}</span>
        <span style="margin-left:auto;font-size:11px;color:var(--text2)">${m.provider}</span>
      </div>
      <div class="mc-caps">${(m.capabilities||[]).map(c=>`<span class="mc-cap">${c}</span>`).join('')}</div>
      <div class="mc-stats">
        <span>$${m.cost_per_1k_input}/1K in</span>
        <span>~${Math.round(m.avg_latency_ms)}ms</span>
        <span>${m.enabled?'enabled':'disabled'}</span>
      </div>
      <div class="mc-actions">
        <button onclick="toggleModel('${escHtml(m.name)}')">${m.enabled?'Disable':'Enable'}</button>
        <button onclick="checkModelHealth('${escHtml(m.name)}')">Health</button>
        <button class="danger" onclick="deleteModel('${escHtml(m.name)}')">Remove</button>
      </div>
    </div>`;
  }).join('');
}

/* ================================================================== */
/*  API CALLS                                                         */
/* ================================================================== */
async function fetchModels(){
  try{
    const r = await fetch(`${API_BASE}/v1/models`);
    const j = await r.json();
    models = (j.data||[]).map(m=>({...m, _health: undefined}));
    renderModels();
    updateModelFilter();
  }catch(e){console.warn('fetchModels failed',e)}
}

async function fetchTraces(){
  try{
    const r = await fetch(`${API_BASE}/v1/traces/recent?n=50`);
    if(!r.ok) return;
    const j = await r.json();
    traces = j.traces || j || [];
    renderAllTraces();
    updateModelFilter();
  }catch(e){console.warn('fetchTraces failed',e)}
}

async function deleteModel(name){
  if(!confirm(`Remove model "${name}"?`)) return;
  try{
    await fetch(`${API_BASE}/v1/models/${encodeURIComponent(name)}`,{method:'DELETE'});
    await fetchModels();
  }catch(e){alert('Failed: '+e)}
}

async function toggleModel(name){
  const m = models.find(x=>x.name===name);
  if(!m) return;
  try{
    await fetch(`${API_BASE}/v1/models/${encodeURIComponent(name)}`,{
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({enabled: !m.enabled})
    });
    await fetchModels();
  }catch(e){alert('Failed: '+e)}
}

async function checkModelHealth(name){
  try{
    const r = await fetch(`${API_BASE}/v1/models/${encodeURIComponent(name)}/health`);
    const j = await r.json();
    const m = models.find(x=>x.name===name);
    if(m) m._health = j.healthy;
    renderModels();
    const msg = j.healthy ? `Healthy (${j.latency_ms}ms)` : `Unhealthy: ${j.error||'unknown error'}`;
    alert(`${name}: ${msg}`);
  }catch(e){alert('Health check failed: '+e)}
}

/* ================================================================== */
/*  ADD MODEL MODAL                                                   */
/* ================================================================== */
function openAddModal(){$('#addModelModal').classList.add('open');$('#mName').value='';$('#mApiBase').value='';$('#mApiKey').value='';$('#mModelId').value='';$('#mCostIn').value='0';$('#mCostOut').value='0';$('#mLatency').value='500';$('#mMaxCtx').value='128000';$$('#addModelModal .caps-grid input[type=checkbox]').forEach(cb=>{cb.checked=cb.value==='text'})}
function closeAddModal(){$('#addModelModal').classList.remove('open')}

async function submitModel(){
  const caps = [];
  $$('#addModelModal .caps-grid input[type=checkbox]:checked').forEach(cb=>caps.push(cb.value));
  const body = {
    name: $('#mName').value.trim(),
    provider: $('#mProvider').value,
    api_base: $('#mApiBase').value.trim(),
    api_key: $('#mApiKey').value.trim(),
    model_id: $('#mModelId').value.trim() || $('#mName').value.trim(),
    capabilities: caps,
    cost_per_1k_input: parseFloat($('#mCostIn').value)||0,
    cost_per_1k_output: parseFloat($('#mCostOut').value)||0,
    avg_latency_ms: parseFloat($('#mLatency').value)||500,
    max_context: parseInt($('#mMaxCtx').value)||128000,
    enabled: true,
  };
  if(!body.name){alert('Name is required');return}
  try{
    const r = await fetch(`${API_BASE}/v1/models`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok){const e=await r.json();alert(e.detail||'Failed');return}
    closeAddModal();
    await fetchModels();
  }catch(e){alert('Failed: '+e)}
}

/* ================================================================== */
/*  DISCOVER MODAL                                                    */
/* ================================================================== */
function openDiscoverModal(){$('#discoverModal').classList.add('open')}
function closeDiscoverModal(){$('#discoverModal').classList.remove('open')}

async function submitDiscover(){
  const body = {
    api_base: $('#dApiBase').value.trim(),
    api_key: $('#dApiKey').value.trim(),
    provider: $('#dProvider').value,
  };
  if(!body.api_base){alert('API Base URL is required');return}
  try{
    const r = await fetch(`${API_BASE}/v1/models/discover`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const j = await r.json();
    closeDiscoverModal();
    alert(`Discovered ${j.count||0} model(s)`);
    await fetchModels();
  }catch(e){alert('Discovery failed: '+e)}
}

/* ================================================================== */
/*  WEBSOCKET                                                         */
/* ================================================================== */
function connectWS(){
  try{
    ws = new WebSocket(WS_URL);
    ws.onopen = ()=>{$('#wsDot').className='dot on';$('#wsLabel').textContent='Connected'};
    ws.onclose = ()=>{$('#wsDot').className='dot off';$('#wsLabel').textContent='Disconnected';setTimeout(connectWS,3000)};
    ws.onerror = ()=>{ws.close()};
    ws.onmessage = (ev)=>{
      try{
        const msg = JSON.parse(ev.data);
        if(msg.type==='new_trace' && msg.trace){
          traces.unshift(msg.trace);
          if(traces.length>200) traces.length=200;
          renderAllTraces();
          updateModelFilter();
        }
        if(msg.type==='model_update'){fetchModels()}
      }catch(e){}
    };
  }catch(e){setTimeout(connectWS,3000)}
}

/* ================================================================== */
/*  INIT                                                              */
/* ================================================================== */
document.addEventListener('DOMContentLoaded', ()=>{
  fetchModels();
  fetchTraces();
  connectWS();
  // Close expanded nodes on outside click
  document.addEventListener('click',(e)=>{
    if(!e.target.closest('.pnode')){$$('.node-expand.open').forEach(el=>el.classList.remove('open'))}
  });
});
</script>
</body>
